<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#eef2f0">
  <title>SolidWorks AI CAD Studio</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand">
        <span>SolidWorks AI Studio</span>
        <strong id="projectTitle">Parametric concept</strong>
      </div>
      <div class="status-row" aria-label="Connection status">
        <span id="aiStatus" class="status-pill">AI offline</span>
        <span id="bridgeStatus" class="status-pill">SolidWorks disconnected</span>
      </div>
    </header>

    <main class="workbench">
      <section id="copilotPanel" class="panel copilot-panel" aria-label="AI input and uploads"></section>
      <section id="requirementsPanel" class="panel requirements-panel" aria-label="Legal standards and requirements"></section>
      <section id="specsPanel" class="panel specs-panel" aria-label="Parameters and geometry controls"></section>
      <section id="modelPanel" class="panel model-panel" aria-label="CAD preview and SolidWorks output"></section>
      <section id="feaPanel" class="panel fea-panel" aria-label="Finite element analysis"></section>
    </main>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/STLLoader.js"></script>
  <script src="app.js?v=19"></script>
</body>
</html>
